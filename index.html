<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>✈️ 비행기 탑승 게이트</title>
<script type="module" src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Malgun Gothic", sans-serif; background: #0f172a; }

  /* 카메라 화면 — 우리가 직접 관리해서 항상 화면 가득 보임 */
  #cameraVideo {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    background: #000;
  }
  #cameraVideo.mirror { transform: scaleX(-1); }  /* 전면 카메라는 거울처럼 */

  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .hidden { display: none !important; }

  #startScreen { background: linear-gradient(160deg, #1d4ed8, #0ea5e9); color: white; }
  #startScreen h1 { font-size: 44px; margin-bottom: 12px; }
  #startScreen p  { font-size: 20px; opacity: .9; margin-bottom: 40px; }
  #startScreen button {
    font-size: 30px; padding: 22px 60px; border: none; border-radius: 60px;
    background: #facc15; color: #1e293b; font-weight: bold; cursor: pointer;
    box-shadow: 0 8px 0 #ca8a04;
  }
  #startScreen button:active { transform: translateY(4px); box-shadow: 0 4px 0 #ca8a04; }

  #setupScreen { background: #1e293b; color: #e2e8f0; }
  #setupScreen h1 { font-size: 32px; margin-bottom: 20px; }
  #setupScreen ol { text-align: left; font-size: 19px; line-height: 1.9; max-width: 560px; }

  #loadingScreen { background: rgba(15, 23, 42, .85); color: white; font-size: 26px; line-height: 1.7; }

  /* 하늘색 둥근 테두리 액자 (표를 찾으면 초록색으로 변함) */
  #frame {
    position: fixed; inset: 12px; z-index: 5;
    border: 21px solid #38bdf8;
    border-radius: 48px;
    box-shadow: 0 0 0 100vmax #bae6fd;   /* 테두리 바깥을 연하늘색으로 채워 모서리가 둥글게 보임 */
    pointer-events: none;
    transition: border-color .2s;
  }
  #frame.found { border-color: #22c55e; }

  /* 오른쪽 위 urinuri 버튼 — 누르면 전면/후면 카메라 전환 (박스 없이 그림만) */
  #flipBtn {
    position: fixed; top: 22px; right: 22px; z-index: 25;
    background: none; border: none; padding: 0; cursor: pointer;
  }
  #flipBtn:active { transform: scale(.93); }
  #flipBtn img { height: 182px; display: block; }

  /* 오른쪽 아래 전체 화면 버튼 */
  #fsBtn {
    position: fixed; bottom: 26px; right: 26px; z-index: 40;
    width: 66px; height: 66px; border-radius: 50%;
    border: 4px solid #38bdf8;
    background: rgba(15, 23, 42, .65); color: white;
    font-size: 30px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #fsBtn:active { transform: scale(.9); }

  /* 게이트 화면 하단 UI (테두리에 가리지 않게 위로 올림) */
  #hud {
    position: fixed; left: 0; right: 0; bottom: 62px; z-index: 20;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 18px; pointer-events: none;
  }
  #statusBar {
    background: rgba(15, 23, 42, .75); color: white;
    font-size: 24px; padding: 12px 30px; border-radius: 40px;
  }
  #checkBtn {
    pointer-events: auto;
    font-size: 26px; padding: 18px 46px; border: none; border-radius: 50px;
    background: #22c55e; color: white; font-weight: bold; cursor: pointer;
    box-shadow: 0 6px 0 #15803d;
  }
  #checkBtn:active { transform: translateY(3px); box-shadow: 0 3px 0 #15803d; }
  #checkBtn:disabled { opacity: .5; }

  /* 결과 화면 */
  #resultOverlay { z-index: 30; color: white; }
  #resultOverlay .emoji { font-size: 130px; margin-bottom: 20px; }
  #resultOverlay .msg   { font-size: 46px; font-weight: bold; }
  #resultOverlay.ok   { background: rgba(22, 163, 74, .92); }
  #resultOverlay.fail { background: rgba(220, 38, 38, .92); }

  @keyframes pop { 0% { transform: scale(.5); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
  #resultOverlay .emoji { animation: pop .5s ease-out; }
</style>
</head>
<body>

<video id="cameraVideo" autoplay muted playsinline></video>

<!-- targets.mind 파일이 없을 때 보여주는 안내 화면 -->
<div id="setupScreen" class="overlay hidden">
  <h1>🎫 준비가 조금 더 필요해요</h1>
  <ol>
    <li>표(탑승권)로 쓸 그림 파일을 준비하세요.</li>
    <li>인터넷에서 <b>MindAR Image Compiler</b> 페이지를 열어 그림을 올리고,<br>
        <b>targets.mind</b> 파일을 내려받으세요.</li>
    <li>내려받은 <b>targets.mind</b> 파일을 이 <b>index.html</b>과<br>같은 폴더에 넣고 새로고침하세요.</li>
  </ol>
</div>

<!-- 시작 화면 (버튼을 눌러야 카메라/음성 사용이 허용됨) -->
<div id="startScreen" class="overlay">
  <h1>✈️ 비행기 탑승 게이트</h1>
  <p>탑승권을 검사하는 게이트를 엽니다</p>
  <button id="openGateBtn">게이트 열기</button>
</div>

<div id="loadingScreen" class="overlay hidden">📷 카메라를 켜는 중...</div>

<!-- 하늘색 둥근 테두리 액자 -->
<div id="frame" class="hidden"></div>

<!-- urinuri 버튼: 전면/후면 카메라 전환 -->
<button id="flipBtn" class="hidden"><img src="./urinuri.png" alt="카메라 전환"></button>

<!-- 전체 화면 버튼 -->
<button id="fsBtn" title="전체 화면">⛶</button>

<!-- 게이트 작동 중 하단 UI -->
<div id="hud" class="hidden">
  <div id="statusBar">🎫 탑승권을 보여주세요</div>
  <button id="checkBtn">🔍 탑승권 검사</button>
</div>

<!-- 결과(성공/실패) 화면 -->
<div id="resultOverlay" class="overlay hidden">
  <div class="emoji"></div>
  <div class="msg"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);

let controller = null;       // MindAR 인식기
let stream = null;           // 카메라 영상 스트림
let facing = "environment";  // "environment"=후면, "user"=전면
let switching = false;       // 카메라 전환 중인가
let ticketVisible = false;   // 지금 카메라에 표가 보이는가
let busy = false;            // 검사 중이거나 결과 화면 표시 중인가
let cooldownUntil = 0;       // 연속 인식 방지용 쉬는 시간

// ---------- 소리 ----------
let audioCtx = null;
function tone(freq, start, dur, type = "sine", vol = 0.25) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime + start);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(audioCtx.currentTime + start);
  o.stop(audioCtx.currentTime + start + dur);
}
function dingSound() { tone(660, 0, .18); tone(880, .18, .35); }
function buzzSound() { tone(180, 0, .4, "square", .15); }

// ---------- 음성 ----------
function speak(text) {
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ko-KR";
    u.rate = 0.95;
    // 목소리는 직접 고르지 않고 기기의 기본 한국어 목소리를 사용
    speechSynthesis.speak(u);
  } catch (e) { /* 음성 미지원 기기에서도 앱은 계속 동작 */ }
}

// ---------- 결과 표시 ----------
function showResult(ok) {
  busy = true;
  const ov = $("resultOverlay");
  ov.className = "overlay " + (ok ? "ok" : "fail");
  ov.querySelector(".emoji").textContent = ok ? "✅" : "❌";
  ov.querySelector(".msg").textContent = ok ? "인증되었습니다" : "다시 인증해주십시오";
  if (ok) { dingSound(); speak("인증되었습니다. 즐거운 여행 되세요."); }
  else    { buzzSound(); speak("다시 인증해주십시오."); }
  setTimeout(() => {
    ov.classList.add("hidden");
    $("statusBar").textContent = "🎫 탑승권을 보여주세요";
    busy = false;
    cooldownUntil = Date.now() + 3000;
  }, 3500);
}

function onTicketSeen() {
  // 검사 버튼을 누르지 않아도, 표가 보이면 바로 인증
  if (!busy && !switching && Date.now() > cooldownUntil) showResult(true);
}

// ---------- 카메라 켜기 + 인식기 연결 ----------
async function startCamera() {
  // 이전 카메라/인식기 정리
  if (controller) { try { controller.stopProcessVideo(); } catch (e) {} controller = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  ticketVisible = false;
  $("frame").classList.remove("found");

  if (!window.MINDAR || !window.MINDAR.IMAGE) {
    throw new Error("인식 라이브러리가 아직 로딩되지 않았습니다");
  }

  const video = $("cameraVideo");
  stream = await navigator.mediaDevices.getUserMedia({
    audio: false,
    video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } }
  });
  video.srcObject = stream;
  await new Promise(res => { video.onloadedmetadata = res; });
  await video.play();
  video.classList.toggle("mirror", facing === "user");

  const { Controller } = window.MINDAR.IMAGE;
  controller = new Controller({
    inputWidth: video.videoWidth,
    inputHeight: video.videoHeight,
    warmupTolerance: 2,
    missTolerance: 8,
    onUpdate: (data) => {
      if (data.type === "updateMatrix") {
        const visible = data.worldMatrix !== null;
        if (visible && !ticketVisible) { ticketVisible = true; onTicketSeen(); }
        if (!visible) ticketVisible = false;
        $("frame").classList.toggle("found", ticketVisible);
      }
    }
  });
  await controller.addImageTargets("./targets.mind");
  await controller.dummyRun(video);   // 인식기 예열 (몇 초 걸림)
  controller.processVideo(video);
}

// ---------- 검사 버튼: 6초 안에 표가 안 보이면 실패 ----------
$("checkBtn").addEventListener("click", () => {
  if (busy || switching) return;
  busy = true;
  $("checkBtn").disabled = true;
  speak("탑승권을 보여주세요.");
  let remain = 6;
  $("statusBar").textContent = "🔍 검사 중... " + remain + "초";
  const timer = setInterval(() => {
    if (ticketVisible) {
      clearInterval(timer);
      $("checkBtn").disabled = false;
      showResult(true);
      return;
    }
    remain -= 1;
    $("statusBar").textContent = "🔍 검사 중... " + remain + "초";
    if (remain <= 0) {
      clearInterval(timer);
      $("checkBtn").disabled = false;
      showResult(false);
    }
  }, 1000);
});

// ---------- urinuri 버튼: 전면/후면 카메라 전환 ----------
$("flipBtn").addEventListener("click", async () => {
  if (switching || busy) return;
  switching = true;
  const before = facing;
  facing = (facing === "environment") ? "user" : "environment";
  $("loadingScreen").textContent = "🔄 카메라를 바꾸는 중...";
  $("loadingScreen").classList.remove("hidden");
  try {
    await startCamera();
  } catch (e) {
    // 전환 실패 시 원래 카메라로 복귀
    facing = before;
    try { await startCamera(); } catch (e2) {}
    $("statusBar").textContent = "⚠️ 카메라 전환이 안 되는 기기예요";
    setTimeout(() => { $("statusBar").textContent = "🎫 탑승권을 보여주세요"; }, 3000);
  }
  $("loadingScreen").classList.add("hidden");
  switching = false;
});

// ---------- 전체 화면 버튼 ----------
$("fsBtn").addEventListener("click", () => {
  const inFs = document.fullscreenElement || document.webkitFullscreenElement;
  if (inFs) {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  } else {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }
});

// ---------- 시작 ----------
$("openGateBtn").addEventListener("click", async () => {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  speak(" "); // 사용자가 버튼을 누른 시점에 음성 기능을 미리 깨워 둠

  // targets.mind(표 그림 인식 데이터)가 있는지 먼저 확인
  // (일부 서버는 없는 파일도 HTML 페이지로 답하므로, 내용 종류까지 확인)
  try {
    const res = await fetch("./targets.mind", { method: "HEAD" });
    const type = (res.headers.get("content-type") || "").toLowerCase();
    if (!res.ok || type.includes("text/html")) throw new Error();
  } catch (e) {
    $("startScreen").classList.add("hidden");
    $("setupScreen").classList.remove("hidden");
    return;
  }

  $("startScreen").classList.add("hidden");
  $("loadingScreen").textContent = "📷 카메라를 켜는 중...";
  $("loadingScreen").classList.remove("hidden");

  try {
    await startCamera();
  } catch (e) {
    $("loadingScreen").innerHTML =
      "⚠️ 카메라를 켤 수 없습니다.<br>브라우저 주소창 옆 자물쇠(또는 설정)에서<br>카메라 권한이 <b>허용</b>인지 확인해주세요.";
    return;
  }

  $("loadingScreen").classList.add("hidden");
  $("hud").classList.remove("hidden");
  $("frame").classList.remove("hidden");
  $("flipBtn").classList.remove("hidden");
  speak("게이트가 열렸습니다. 탑승권을 보여주세요.");
});
</script>
</body>
</html>
